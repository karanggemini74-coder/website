server {
    listen 80;
    server_name example.com;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect HTTP to HTTPS
    if ($scheme != "https") {
        return 301 https://$host$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;

        # Security Headers
        # Content Security Policy (CSP)
        # Allows scripts from self, Tailwind CDN, and esm.sh. 
        # Allows styles from self, unsafe-inline (for styled-components/Tailwind), and Google Fonts.
        # Allows images from Unsplash, transparenttextures, and Google Drive.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://www.transparenttextures.com https://drive.google.com https://*.googleusercontent.com; connect-src 'self' https://esm.sh;" always;

        # Prevent Clickjacking
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Strict Transport Security (HSTS) - Enforce HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions Policy - Disable sensitive features not used
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}