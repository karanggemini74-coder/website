<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karan Vijayvargiya | SEBI Registered Research</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preload" as="image" href="/logo.png" fetchpriority="high">
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?q=80&w=1200&auto=format&fit=crop" fetchpriority="high">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <script src="https://cdn.userway.org/widget.js" data-account="x0wE2QJqI6"></script>
  </head>
  <body>
    <!-- SCRIPT FOR ERROR LOGGING -->
    <script>
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        var string = msg.toLowerCase();
        var substring = "script error";
        if (string.indexOf(substring) > -1){
          alert('Script Error: See Browser Console for Detail');
        } else {
          var message = [
            'Message: ' + msg,
            'URL: ' + url,
            'Line: ' + lineNo,
            'Column: ' + columnNo,
            'Error object: ' + JSON.stringify(error)
          ].join(' - ');
          var div = document.createElement('div');
          div.style.padding = '20px';
          div.style.background = 'red';
          div.style.color = 'white';
          div.innerHTML = message;
          document.body.prepend(div);
        }
        return false;
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.padding = '20px';
        div.style.background = 'orange';
        div.style.color = 'black';
        div.innerHTML = 'Unhandled Promise Rejection: ' + event.reason;
        document.body.prepend(div);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'IMG') {
          console.error('Image failed to load:', e.target.src);
        }
      }, true);
    </script>
  </body>
</html>
